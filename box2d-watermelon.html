<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark.js - Box2D watermelon example</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="src/examples/box2d/box2d_watermelon.css">
    <script src="src/engine/renderer.js"></script>
    <script src="src/engine/main.js"></script>
    <script src="src/engine/utils_math.js"></script>
    <script src="src/engine/input.js"></script>
    <script src="src/engine/audioplayer.js"></script>
    <script src="src/engine/game.js"></script>
    <script src="src/engine/utils_classes.js"></script>
    <script src="src/engine/gameobjects.js"></script>
    <script src="src/engine/htmlmenu.js"></script>
    <script src="src/lib/Box2D.js"></script>
    <script src="src/engine/box2d_helper.js"></script>
    <script src="src/engine/box2d_game.js"></script>
    <script src="src/engine/box2d_gameobjects.js"></script>
    <script src="src/examples/box2d/box2d_watermelon.js"></script>
</head>
<body>
    <div id="wm-container">
        <canvas id="myCanvas" width="720" height="1280"></canvas>

        <!-- Suika-style score UI overlay -->
        <div id="wm-ui">
            <div class="wm-bubbles-row">
                <div class="wm-bubble">
                    <div class="wm-bubble-label">Best</div>
                    <div class="wm-bubble-value" id="wm-best">0</div>
                </div>
                <div class="wm-bubble">
                    <div class="wm-bubble-label">Score</div>
                    <div class="wm-bubble-value" id="wm-score">0</div>
                </div>
                <div class="wm-bubble">
                    <div class="wm-bubble-label">Next</div>
                    <div id="wm-next-fruit"></div>
                </div>
            </div>
            <button id="wm-mute" class="wm-bubble">🔊</button>
        </div>
    </div>
</body>
</html>
